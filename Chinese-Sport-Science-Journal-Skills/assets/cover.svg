<svg xmlns="http://www.w3.org/2000/svg" width="880" height="1100" viewBox="0 0 880 1100" role="img" aria-label="Chinese Sport Science Journal Skills — 12 CSSCI sport-science journals">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1410"/>
      <stop offset="0.55" stop-color="#0f2a22"/>
      <stop offset="1" stop-color="#13233b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <rect width="880" height="1100" fill="url(#bg)"/>
  <rect x="36" y="36" width="808" height="1028" rx="28" fill="none" stroke="#1f4a3c" stroke-width="2"/>

  <!-- runner / motion motif -->
  <g transform="translate(440,250)" stroke="url(#accent)" fill="none" opacity="0.92" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="34" cy="-78" r="22" stroke-width="6"/>
    <path d="M-60 70 L-6 24 L40 44 L74 8" stroke-width="10"/>
    <path d="M-6 24 L10 -34 L34 -56" stroke-width="10"/>
    <path d="M10 -34 L58 -20 L96 -44" stroke-width="10"/>
    <path d="M10 -34 L-22 -70" stroke-width="10"/>
  </g>
  <g transform="translate(440,250)" stroke="#22d3ee" stroke-width="3" fill="none" opacity="0.45">
    <path d="M-150 96 H-92"/>
    <path d="M-168 122 H-110"/>
    <path d="M-150 148 H-100"/>
  </g>

  <text x="440" y="470" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="58" fill="#f4f6fb" font-weight="700">中文体育学</text>
  <text x="440" y="538" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="44" fill="#f4f6fb" font-weight="700">期刊 Skills</text>
  <text x="440" y="596" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#34d399" font-weight="600">Chinese Sport Science Journal Skills</text>

  <line x1="240" y1="644" x2="640" y2="644" stroke="#1f4a3c" stroke-width="2"/>

  <text x="440" y="702" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="30" fill="#cbd5e1">12 本 CSSCI 体育学来源刊</text>
  <text x="440" y="744" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#94a3b8">体育科学 · 中国体育科技 · 北体 · 上体 · 武体</text>
  <text x="440" y="776" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#94a3b8">成体 · 西体 · 沈体 · 天体 · 体育学刊 · 体育与科学</text>

  <g font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#0a1410">
    <rect x="250" y="828" width="160" height="44" rx="22" fill="url(#accent)"/>
    <text x="330" y="856" text-anchor="middle" font-weight="700">选刊 · 框定</text>
    <rect x="470" y="828" width="160" height="44" rx="22" fill="#22d3ee"/>
    <text x="550" y="856" text-anchor="middle" font-weight="700">期刊口味</text>
  </g>

  <text x="440" y="960" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#64748b">一刊一张「定位 + 写作风格」skill</text>
  <text x="440" y="990" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#64748b">+ cn-sport-journal-workflow 选刊路由</text>
</svg>
